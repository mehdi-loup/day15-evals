name: Eval Suite

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 6am UTC daily — results ready when you sit down (North America morning)
    - cron: "0 6 * * *"

# Estimated cost per run: ~$0.010 (grader calls + deployed agent HTTP)
# At nightly cadence: ~$0.30/month — non-issue for a solo project.

jobs:
  eval:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run wallet_agent eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          uv run inspect eval evals/wallet_agent.py \
            --model anthropic/claude-haiku-4-5-20251001 \
            --log-dir logs/ 2>&1 | tee /tmp/wallet_agent_out.txt

      - name: Run agentic_rag eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          uv run inspect eval evals/agentic_rag.py \
            --model anthropic/claude-haiku-4-5-20251001 \
            --log-dir logs/ 2>&1 | tee /tmp/agentic_rag_out.txt

      - name: Run combined_routing eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          uv run inspect eval evals/combined_routing.py \
            --model anthropic/claude-haiku-4-5-20251001 \
            --log-dir logs/ 2>&1 | tee /tmp/combined_routing_out.txt

      - name: Check accuracy thresholds
        # Gate: accuracy must be >= threshold for all accuracy-based scorers.
        # Thresholds:
        #   wallet_agent tool_routing:      1.00 (deterministic, should never regress)
        #   agentic_rag  tool_routing:      1.00 (deterministic)
        #   agentic_rag  faithfulness:      0.83 (5/6 — rag-ungrounded-general-defi shows
        #                                          agent-level non-determinism; documented in
        #                                          STABILITY.md and Day 16 RESULTS.md)
        #   combined_routing routing_v2:    1.00 (deterministic)
        #   combined_routing faithfulness:  1.00 (all 6 cases stable per flake test)
        run: |
          python - <<'PYEOF'
          import re, sys

          def extract_accuracy(path, scorer_name):
              with open(path) as f:
                  text = f.read()
              pattern = rf"{re.escape(scorer_name)}.*?accuracy\s+([\d.]+)"
              m = re.search(pattern, text, re.DOTALL)
              if m:
                  return float(m.group(1))
              return None

          checks = [
              ("/tmp/wallet_agent_out.txt",     "tool_routing_scorer", 1.00),
              ("/tmp/agentic_rag_out.txt",       "tool_routing_scorer", 1.00),
              ("/tmp/agentic_rag_out.txt",       "faithfulness_scorer", 0.83),
              ("/tmp/combined_routing_out.txt",  "routing_scorer_v2",   1.00),
              ("/tmp/combined_routing_out.txt",  "faithfulness_scorer", 1.00),
          ]

          failed = False
          for path, scorer, threshold in checks:
              acc = extract_accuracy(path, scorer)
              if acc is None:
                  print(f"FAIL: could not parse accuracy for {scorer} in {path}")
                  failed = True
              elif acc < threshold:
                  print(f"FAIL: {scorer} accuracy {acc:.3f} < threshold {threshold:.3f} ({path})")
                  failed = True
              else:
                  print(f"PASS: {scorer} accuracy {acc:.3f} >= {threshold:.3f}")

          sys.exit(1 if failed else 0)
          PYEOF

      - name: Check p50 latency budgets
        # Gate: p50 latency per task must be below budget.
        # p99 is informational only — cold-start Lambda outliers inflate it unpredictably.
        # Budgets (2x observed warm p50):
        #   wallet_agent      p50 < 8000ms
        #   agentic_rag       p50 < 15000ms
        #   combined_routing  p50 < 20000ms
        run: |
          python - <<'PYEOF'
          import re, sys

          def extract_p50(path):
              with open(path) as f:
                  text = f.read()
              m = re.search(r"p50_ms\s+([\d.]+)", text)
              if m:
                  return float(m.group(1))
              return None

          checks = [
              ("/tmp/wallet_agent_out.txt",    8000),
              ("/tmp/agentic_rag_out.txt",    15000),
              ("/tmp/combined_routing_out.txt", 20000),
          ]

          failed = False
          for path, budget_ms in checks:
              p50 = extract_p50(path)
              label = path.split("/")[-1].replace("_out.txt", "")
              if p50 is None:
                  print(f"WARN: could not parse p50_ms for {label} -- skipping latency check")
              elif p50 > budget_ms:
                  print(f"FAIL: {label} p50={p50:.0f}ms exceeds budget {budget_ms}ms")
                  failed = True
              else:
                  print(f"PASS: {label} p50={p50:.0f}ms <= {budget_ms}ms")

          sys.exit(1 if failed else 0)
          PYEOF

      - name: Upload eval logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-logs
          path: logs/
          retention-days: 90
