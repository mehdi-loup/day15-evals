name: Eval Suite

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 6am UTC daily — results ready when you sit down (North America morning)
    - cron: "0 6 * * *"

# Estimated cost per run: ~$0.010 (grader calls + deployed agent HTTP)
# At nightly cadence: ~$0.30/month — non-issue for a solo project.

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run wallet_agent eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run inspect eval evals/wallet_agent.py --model anthropic/claude-haiku-4-5-20251001 --log-dir logs/

      - name: Run agentic_rag eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run inspect eval evals/agentic_rag.py --model anthropic/claude-haiku-4-5-20251001 --log-dir logs/

      - name: Run combined_routing eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run inspect eval evals/combined_routing.py --model anthropic/claude-haiku-4-5-20251001 --log-dir logs/

      - name: Check accuracy and latency thresholds
        # CI-blocking (deterministic, stable):
        #   wallet_agent tool_routing_scorer:        1.00
        #   agentic_rag  tool_routing_scorer:        1.00
        #   combined_routing routing_scorer_v2:      0.67 (4/6 floor; ambiguous-price-impact flakes)
        #
        # Excluded from CI gate (collected but informational):
        #   faithfulness scorers: agent non-determinism + cold-start stream cutoffs → too noisy
        #   latency for combined_routing: external services (Voyage AI, Supabase) cold-start ~70s
        #
        # Latency budgets (p50):
        #   wallet_agent  p50 < 30000ms
        #   agentic_rag   p50 < 30000ms
        run: |
          uv run python - <<'PYEOF'
          import glob, json, subprocess, sys
          from collections import defaultdict

          ACCURACY_THRESHOLDS = {
              # Routing scorers are deterministic — 1.00 is reliable and catches real regressions.
              "wallet-agent":     {"tool_routing_scorer": 1.00},
              "agentic-rag":      {"tool_routing_scorer": 1.00},
              # combined-routing routing: 0.67 — ambiguous-price-impact intermittently fires the
              # forbidden getTokenPrice. Floor at 4/6 to catch systematic failures.
              "combined-routing": {"routing_scorer_v2": 0.67},
              # Faithfulness and latency are excluded from CI gates: too noisy due to agent
              # non-determinism + cold-start stream cutoffs. Scores still collected for monitoring.
          }
          P50_BUDGETS = {
              # p50 budgets: only on wallet-agent (stable) and agentic-rag (mostly stable).
              # combined-routing excluded — 4/6 cases call external services with cold-start p50~70s.
              "wallet-agent":     30000,
              "agentic-rag":      30000,
          }

          def load_log(task_slug):
              pattern = f"logs/*{task_slug}*.eval"
              files = sorted(glob.glob(pattern))
              if not files:
                  return None
              log_file = files[-1]
              raw = subprocess.check_output(
                  ["uv", "run", "inspect", "log", "dump", log_file],
                  stderr=subprocess.DEVNULL,
              )
              return json.loads(raw)

          failed = False

          for task_slug in ["wallet-agent", "agentic-rag", "combined-routing"]:
              data = load_log(task_slug)
              if data is None:
                  print(f"FAIL: no log file found for {task_slug}")
                  failed = True
                  continue

              samples = data.get("samples", [])
              scorer_verdicts = defaultdict(list)
              latency_values = []

              for s in samples:
                  for scorer_name, score_data in s.get("scores", {}).items():
                      if not isinstance(score_data, dict):
                          continue
                      val = score_data.get("value")
                      if scorer_name == "latency_scorer":
                          if isinstance(val, (int, float)):
                              latency_values.append(float(val))
                      else:
                          scorer_verdicts[scorer_name].append(val in ("C", 1, 1.0, True))

              # Accuracy checks
              for scorer_name, threshold in ACCURACY_THRESHOLDS.get(task_slug, {}).items():
                  verdicts = scorer_verdicts.get(scorer_name)
                  if not verdicts:
                      print(f"FAIL: {task_slug}/{scorer_name} — no results found")
                      failed = True
                      continue
                  acc = sum(verdicts) / len(verdicts)
                  if acc < threshold:
                      print(f"FAIL: {task_slug}/{scorer_name} accuracy={acc:.3f} < threshold={threshold:.3f}")
                      failed = True
                  else:
                      print(f"PASS: {task_slug}/{scorer_name} accuracy={acc:.3f}")

              # p50 latency check
              budget = P50_BUDGETS.get(task_slug)
              if latency_values and budget:
                  p50 = sorted(latency_values)[len(latency_values) // 2]
                  p99 = sorted(latency_values)[-1]  # informational
                  if p50 > budget:
                      print(f"FAIL: {task_slug} p50={p50:.0f}ms exceeds budget {budget}ms (p99={p99:.0f}ms, informational)")
                      failed = True
                  else:
                      print(f"PASS: {task_slug} p50={p50:.0f}ms <= {budget}ms (p99={p99:.0f}ms, informational)")

          sys.exit(1 if failed else 0)
          PYEOF

      - name: Upload eval logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-logs
          path: logs/
          retention-days: 90
